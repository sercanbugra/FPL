{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FPL Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.dataTables.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="{% static 'fpldash/style.css' %}?v=12">
</head>

<body>
<div class="app-shell">

  <!-- ── HEADER ── -->
  <header class="app-header">
    <div class="brand">
      <span>⚽ FPL Dashboard</span>
      <span class="brand-badge">Analytics</span>
    </div>
    <div class="header-meta">
      <span class="gw-chip" id="gwChip">GW —</span>
    </div>
  </header>

  <!-- ── BODY ── -->
  <div class="app-body">

    <!-- LEFT SIDEBAR: My Team -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">My Squad</div>
      <div class="sidebar-body" id="team-list">
        <div class="spinner"><div class="spin"></div> Loading…</div>
      </div>
    </aside>

    <div class="resizer vertical" id="resizerV"></div>

    <!-- MAIN CONTENT: tabs -->
    <div class="main-content">

      <nav class="main-tabs">
        <button class="tab-btn active" data-tab="stats">Player Stats</button>
        <button class="tab-btn"        data-tab="forecast">GW Forecast</button>
        <button class="tab-btn"        data-tab="polygon">Polygon Filter</button>
      </nav>

      <div class="main-panes">

        <!-- TAB 1: Player Stats -->
        <div class="tab-pane active" id="pane-stats">
          <div class="table-wrap">
            <table id="fplTable" class="display" style="width:100%">
              <thead><tr></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </div>

        <!-- TAB 2: GW Forecast -->
        <div class="tab-pane" id="pane-forecast">
          <div class="table-wrap">
            <table id="forecastTable" class="display" style="width:100%">
              <thead><tr></tr></thead>
              <tbody></tbody>
            </table>
            <p id="forecastError" class="text-danger small mt-2" style="display:none"></p>
          </div>
        </div>

        <!-- TAB 3: Polygon Filter -->
        <div class="tab-pane" id="pane-polygon">
          <div class="polygon-tab-body">
            <div class="polygon-controls">
              <label>Select 3–6 metrics</label>
              <div class="metric-options" id="metricOptions">
                <div class="spinner"><div class="spin"></div></div>
              </div>
              <button id="drawPolygonBtn" class="btn btn-primary btn-sm mt-3">Draw Radar</button>
            </div>
            <div class="polygon-chart-wrap">
              <canvas id="radarChart"></canvas>
            </div>
            <div class="polygon-results" id="suggestion-list">
              <p class="text-muted small">Draw a polygon to filter players.</p>
            </div>
          </div>
        </div>

      </div><!-- /main-panes -->
    </div><!-- /main-content -->

    <!-- RIGHT RAIL -->
    <aside class="right-rail">
      <div class="rail-tabs">
        <button class="rtab-btn active" data-rtab="prices">Price Changes</button>
        <button class="rtab-btn"       data-rtab="picks">Smart Picks</button>
      </div>
      <div class="rail-pane active" id="rpane-prices">
        <div id="price-list"><div class="spinner"><div class="spin"></div> Loading…</div></div>
      </div>
      <div class="rail-pane" id="rpane-picks">
        <div id="smart-picks-list"><div class="spinner"><div class="spin"></div> Loading…</div></div>
      </div>
    </aside>

  </div><!-- /app-body -->
</div><!-- /app-shell -->

<!-- Bottom logo -->
<img id="bottom-logo" src="{% static 'fpldash/images/logo.jpg' %}" alt="Logo">

<!-- Player Modal -->
<div class="modal fade" id="playerModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="playerModalLabel">Player Details</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="modal-player-details"></div>
    </div>
  </div>
</div>

<!-- SCRIPTS -->
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.html5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.print.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="{% static 'fpldash/polygon.js' %}?v=4"></script>

<script>
// ── UTILS ──────────────────────────────────────────────────
function posBadge(pos) {
  return `<span class="pos-badge ${pos}">${pos}</span>`;
}
function fdrBadge(val) {
  const n = parseFloat(val);
  const cls = n <= 2 ? 'fdr-1' : n >= 4 ? 'fdr-4' : 'fdr-3';
  return `<span class="fdr-badge ${cls}">${n.toFixed(1)}</span>`;
}
function linkify(text) {
  if (!text) return '';
  return text
    .replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>')
    .replace(/(^|\s)@([A-Za-z0-9_]{1,15})/g, '$1<a href="https://twitter.com/$2" target="_blank">@$2</a>')
    .replace(/(^|\s)#([A-Za-z0-9_]+)/g, '$1<a href="https://twitter.com/hashtag/$2" target="_blank">#$2</a>');
}

// ── TAB SYSTEM ─────────────────────────────────────────────
function setupTabs() {
  // Main tabs
  document.querySelectorAll('.main-tabs .tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.main-tabs .tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('pane-' + btn.dataset.tab).classList.add('active');
      // Redraw DataTables when tab becomes visible
      if (btn.dataset.tab === 'stats' && $.fn.dataTable.isDataTable('#fplTable')) {
        $('#fplTable').DataTable().columns.adjust();
      }
      if (btn.dataset.tab === 'forecast' && $.fn.dataTable.isDataTable('#forecastTable')) {
        $('#forecastTable').DataTable().columns.adjust();
      }
    });
  });
  // Rail tabs
  document.querySelectorAll('.rail-tabs .rtab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.rail-tabs .rtab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.rail-pane').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('rpane-' + btn.dataset.rtab).classList.add('active');
    });
  });
}

// ── SIDEBAR RESIZER ────────────────────────────────────────
function setupResizer() {
  const sidebar   = document.getElementById('sidebar');
  const resizer   = document.getElementById('resizerV');
  let dragging = false;
  resizer.addEventListener('mousedown', e => { dragging = true; resizer.classList.add('active'); e.preventDefault(); });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    const w = Math.min(Math.max(e.clientX, 140), 380);
    sidebar.style.flex = `0 0 ${w}px`;
  });
  window.addEventListener('mouseup', () => { dragging = false; resizer.classList.remove('active'); });
}

// ── MY TEAM (PITCH VIEW) ───────────────────────────────────
async function loadMyTeam() {
  const container = document.getElementById('team-list');
  try {
    const resp = await fetch('/api/myteam');
    const players = await resp.json();
    if (!Array.isArray(players) || players.length === 0) {
      container.innerHTML = '<p class="text-muted small p-2">No team data.</p>';
      return;
    }

    const starters = players.filter(p => p.starting);
    const bench    = players.filter(p => !p.starting);

    // Group starters by position
    const byPos = { GK: [], DEF: [], MID: [], FWD: [] };
    starters.forEach(p => { if (byPos[p.position]) byPos[p.position].push(p); });

    function token(p, isBench) {
      const capBadge = p.is_captain
        ? '<span class="ptok-cap">C</span>'
        : p.is_vice_captain ? '<span class="ptok-cap vc">V</span>' : '';
      return `
        <div class="ptok${isBench ? ' bench' : ''}">
          <div class="ptok-img-wrap">
            <img src="${p.photo}"
                 onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'">
            ${capBadge}
            <span class="ptok-pts">${p.last_gw_points}</span>
          </div>
          <div class="ptok-name">${p.web_name}</div>
        </div>`;
    }

    function row(list, isBench) {
      return `<div class="pitch-row">${list.map(p => token(p, isBench)).join('')}</div>`;
    }

    container.innerHTML = `
      <div class="pitch-container">
        <div class="pitch">
          <!-- SVG pitch markings -->
          <svg class="pitch-svg" viewBox="0 0 220 310" preserveAspectRatio="none"
               xmlns="http://www.w3.org/2000/svg">
            <!-- Alternating stripe bands -->
            <rect width="220" height="310" fill="#2d8a1f"/>
            <rect y="0"   width="220" height="38.75" fill="#317f1c"/>
            <rect y="77.5"  width="220" height="38.75" fill="#317f1c"/>
            <rect y="155"   width="220" height="38.75" fill="#317f1c"/>
            <rect y="232.5" width="220" height="38.75" fill="#317f1c"/>
            <!-- Field border -->
            <rect x="10" y="10" width="200" height="290" fill="none"
                  stroke="rgba(255,255,255,0.65)" stroke-width="1.8"/>
            <!-- Centre line -->
            <line x1="10" y1="155" x2="210" y2="155"
                  stroke="rgba(255,255,255,0.65)" stroke-width="1.4"/>
            <!-- Centre circle + dot -->
            <circle cx="110" cy="155" r="32" fill="none"
                    stroke="rgba(255,255,255,0.65)" stroke-width="1.4"/>
            <circle cx="110" cy="155" r="2.2" fill="rgba(255,255,255,0.65)"/>
            <!-- Top penalty area -->
            <rect x="55" y="10" width="110" height="52" fill="none"
                  stroke="rgba(255,255,255,0.65)" stroke-width="1.4"/>
            <!-- Top goal area -->
            <rect x="80" y="10" width="60" height="20" fill="none"
                  stroke="rgba(255,255,255,0.65)" stroke-width="1.4"/>
            <!-- Top penalty spot -->
            <circle cx="110" cy="52" r="2" fill="rgba(255,255,255,0.65)"/>
            <!-- Bottom penalty area -->
            <rect x="55" y="248" width="110" height="52" fill="none"
                  stroke="rgba(255,255,255,0.65)" stroke-width="1.4"/>
            <!-- Bottom goal area -->
            <rect x="80" y="280" width="60" height="20" fill="none"
                  stroke="rgba(255,255,255,0.65)" stroke-width="1.4"/>
            <!-- Bottom penalty spot -->
            <circle cx="110" cy="258" r="2" fill="rgba(255,255,255,0.65)"/>
          </svg>
          <!-- Player rows overlaid on the pitch -->
          <div class="pitch-rows">
            ${row(byPos.FWD)}
            ${row(byPos.MID)}
            ${row(byPos.DEF)}
            ${row(byPos.GK)}
          </div>
        </div>
        <!-- Bench -->
        <div class="bench-strip">
          <span class="bench-lbl">BENCH</span>
          <div class="pitch-row">${bench.map(p => token(p, true)).join('')}</div>
        </div>
      </div>`;

    window._myTeamSet = new Set(players.map(p => p.web_name));
  } catch(e) {
    container.innerHTML = '<p class="text-danger small p-2">Failed to load team.</p>';
  }
}

// ── COLUMN HEADER TOOLTIPS ─────────────────────────────────
const COL_TIPS = {
  'Player':          'Player display name',
  'Team':            'Premier League club',
  'Position':        'Playing position: GK / DEF / MID / FWD',
  'Price (GBP m)':   'Current FPL price in millions (£)',
  'FDR':             'Average Fixture Difficulty Rating for the next 3 gameweeks (1 = easy, 5 = hard)',
  'FDR Next 3':      'Average Fixture Difficulty Rating for the next 3 gameweeks (1 = easy, 5 = hard)',
  'Total Points':    'Total FPL points scored this season',
  'Median':          'Points per game (PPG) as reported by FPL',
  'Avg':             'Weighted average points: 70% form + 30% PPG',
  'xG Points':       'Expected goal contributions: xG × position goal-pts + xA × 3',
  'Appearances':     'Approximate full matches played (minutes ÷ 90, rounded)',
  'Goals':           'Total goals scored this season',
  'Assists':         'Total assists this season',
  'Goals per App':   'Goals scored per appearance',
  'Assists per App': 'Assists per appearance',
  'Y Cards':         'Yellow cards received this season',
  'R Cards':         'Red cards received this season',
  'Discip Index':    'Discipline index: yellow cards + 3 × red cards (higher = worse)',
  'Last GW Pts':     'Points scored in the most recently completed gameweek',
  'Form Score':      'Weighted form: 70% FPL form rating + 30% last GW points',
  'PPG Score':       'Weighted PPG: 60% points-per-game + 40% last GW points',
  'Predicted Score': 'Overall prediction = (Form Score + PPG Score) ÷ 2',
};

// ── FPL TABLE ──────────────────────────────────────────────
const HIDDEN_COLS = new Set(['PlayerId', 'PlayerPhoto']);

async function loadStatsTable() {
  const resp = await fetch('/api/data');
  const rows = await resp.json();
  if (!rows.length) return;

  const myTeam = window._myTeamSet || new Set();
  const colDefs = Object.keys(rows[0]).map(key => {
    const def = { data: key, title: key.replace(/_/g, ' '), visible: !HIDDEN_COLS.has(key) };
    if (key === 'Position') {
      // Return plain text for filter/sort so column search works correctly;
      // HTML badge only for display.
      def.render = (data, type) => type === 'display' ? posBadge(data) : data;
    } else if (key === 'FDR Next 3') {
      def.render = (data, type) => type === 'display' ? fdrBadge(data) : data;
      def.title = 'FDR';
    }
    return def;
  });

  // Build header — ALL columns must have a <th> (DataTables inserts hidden
  // ones itself if they're missing, shifting the filter row). Hidden cols
  // get display:none so they occupy the right slot without being visible.
  const hdr = $('#fplTable thead tr');
  hdr.empty();
  colDefs.forEach(c => {
    const tip  = COL_TIPS[c.title] || COL_TIPS[c.data] || '';
    const hide = c.visible === false ? ' style="display:none"' : '';
    hdr.append(`<th${hide}${tip ? ` title="${tip}"` : ''}>${c.title}</th>`);
  });

  // Filter row — same structure, same count; hidden cols get an empty hidden cell
  $('#fplTable thead').append('<tr class="filters"></tr>');
  const fRow = $('#fplTable thead tr.filters');
  fRow.empty();
  colDefs.forEach(c => {
    if (c.visible === false) {
      fRow.append('<th style="display:none"></th>');
      return;
    }
    if (c.title === 'Position') {
      const opts = [...new Set(rows.map(r => r.Position))].map(v => `<option value="${v}">${v}</option>`).join('');
      fRow.append(`<th><select><option value="">All</option>${opts}</select></th>`);
    } else {
      fRow.append(`<th><input type="text" placeholder="${c.title}"></th>`);
    }
  });

  if ($.fn.dataTable.isDataTable('#fplTable')) $('#fplTable').DataTable().destroy();

  const tbl = $('#fplTable').DataTable({
    data: rows,
    columns: colDefs,
    pageLength: 20,
    scrollX: true,
    autoWidth: false,
    dom: '<"d-flex align-items-center gap-2 mb-2"Bf>rtip',
    buttons: [
      { extend: 'csv',   text: 'CSV' },
      { extend: 'excel', text: 'Excel' },
      { extend: 'print', text: 'Print' },
    ],
    orderCellsTop: true,
    createdRow(row, data) {
      if (myTeam.has(data.Player)) $(row).addClass('in-my-team');
    },
    initComplete() {
      const api = this.api();
      // fRow now has one <th> per colDef (same index), so ci maps directly
      colDefs.forEach((c, ci) => {
        if (c.visible === false) return;
        $('input,select', fRow.children().eq(ci)).on('keyup change', function() {
          if (api.column(ci).search() !== this.value) api.column(ci).search(this.value).draw();
        });
      });
    }
  });

  $('#fplTable tbody').on('click', 'tr', async function() {
    const d = tbl.row(this).data();
    if (d) await showModal(d);
  });

  buildPolygonCheckboxes(rows[0]);
}

// ── FORECAST TABLE ─────────────────────────────────────────
async function loadForecast() {
  const errEl = document.getElementById('forecastError');
  try {
    const resp = await fetch('/api/forecast');
    if (!resp.ok) { errEl.textContent = `Forecast error (${resp.status})`; errEl.style.display='block'; return; }
    const rows = await resp.json();
    if (!rows.length) { errEl.textContent = 'No forecast data.'; errEl.style.display='block'; return; }

    const colDefs = Object.keys(rows[0]).map(key => {
      const def = { data: key, title: key.replace(/_/g, ' ') };
      if (key === 'Position') def.render = data => posBadge(data);
      if (key === 'FDR Next 3') { def.render = data => fdrBadge(data); def.title = 'FDR'; }
      return def;
    });

    const hdr = $('#forecastTable thead tr');
    hdr.empty();
    colDefs.forEach(c => {
      const tip = COL_TIPS[c.title] || COL_TIPS[c.data] || '';
      hdr.append(`<th${tip ? ` title="${tip}"` : ''}>${c.title}</th>`);
    });
    $('#forecastTable thead').append('<tr class="filters"></tr>');
    const fRow = $('#forecastTable thead tr.filters');
    fRow.empty();
    colDefs.forEach(c => {
      if (c.title === 'Position') {
        const opts = [...new Set(rows.map(r => r.Position))].map(v => `<option value="${v}">${v}</option>`).join('');
        fRow.append(`<th><select><option value="">All</option>${opts}</select></th>`);
      } else {
        fRow.append(`<th><input type="text" placeholder="${c.title}"></th>`);
      }
    });

    if ($.fn.dataTable.isDataTable('#forecastTable')) $('#forecastTable').DataTable().destroy();

    $('#forecastTable').DataTable({
      data: rows,
      columns: colDefs,
      pageLength: 15,
      scrollX: true,
      autoWidth: false,
      dom: '<"d-flex align-items-center gap-2 mb-2"Bf>rtip',
      buttons: [
        { extend: 'csv', text: 'CSV' },
        { extend: 'excel', text: 'Excel' },
      ],
      orderCellsTop: true,
      initComplete() {
        const api = this.api();
        api.columns().every(function(i) {
          $('input,select', fRow.children().eq(i)).on('keyup change', function() {
            if (api.column(i).search() !== this.value) api.column(i).search(this.value).draw();
          });
        });
      }
    });
  } catch(e) {
    errEl.textContent = 'Error: ' + e;
    errEl.style.display = 'block';
  }
}

// ── PLAYER MODAL ───────────────────────────────────────────
async function showModal(player) {
  const body = document.getElementById('modal-player-details');
  body.innerHTML = '';

  const slug = player.PlayerPhoto;
  const photoURL = slug
    ? `https://resources.premierleague.com/premierleague/photos/players/250x250/p${slug}.png`
    : 'https://cdn-icons-png.flaticon.com/512/149/149071.png';

  body.innerHTML = `
    <div class="d-flex align-items-center gap-3 mb-3">
      <img src="${photoURL}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'"
           style="width:72px;height:72px;border-radius:50%;border:3px solid var(--primary);object-fit:cover">
      <div>
        <h5 class="mb-1">${player.Player}</h5>
        <div class="d-flex gap-2 align-items-center">
          ${posBadge(player.Position)}
          <span class="text-muted small">${player.Team}</span>
          <span class="fw-bold small">£${player['Price (GBP m)']}m</span>
          <span class="ms-1">FDR ${fdrBadge(player['FDR Next 3'])}</span>
        </div>
        <div class="mt-1 small text-muted">
          Total: <b>${player['Total Points']} pts</b> &nbsp;|&nbsp;
          Form: <b>${player.Avg}</b> &nbsp;|&nbsp;
          xG Pts: <b>${player['xG Points']}</b>
        </div>
      </div>
    </div>
    <p class="fw-semibold small mb-1">GW-by-GW Points</p>
    <div id="modal-history-wrap"></div>`;

  const wrap = document.getElementById('modal-history-wrap');
  wrap.innerHTML = '<div class="spinner"><div class="spin"></div> Loading history…</div>';

  try {
    if (!player.PlayerId) throw new Error('no id');
    const res  = await fetch(`/api/player-summary/${player.PlayerId}`);
    const data = await res.json();
    const hist = (data.history || []).sort((a,b) => a.round - b.round);
    if (!hist.length) { wrap.innerHTML = '<p class="text-muted small">No history yet.</p>'; }
    else {
      const rows = hist.map(g =>
        `<tr><td class="text-muted">GW ${g.round}</td>
              <td class="fw-bold text-end">${g.total_points}</td></tr>`).join('');
      wrap.innerHTML = `<table class="table table-sm table-bordered" style="font-size:0.78rem">
        <thead class="table-dark"><tr><th>GW</th><th class="text-end">Points</th></tr></thead>
        <tbody>${rows}</tbody></table>`;
    }
  } catch(e) {
    wrap.innerHTML = '<p class="text-danger small">Failed to load history.</p>';
  }

  new bootstrap.Modal(document.getElementById('playerModal')).show();
}

// ── PRICE CHANGES ──────────────────────────────────────────
async function loadPriceChanges() {
  const el = document.getElementById('price-list');
  try {
    const res  = await fetch('/api/pricechanges_fpl');
    const rows = await res.json();
    if (!Array.isArray(rows) || !rows.length) throw new Error('empty');
    el.innerHTML = '<p class="pos-section-hdr">Latest FPL Price Changes</p>';
    rows.forEach(p => {
      const sign  = p.Change_Event > 0 ? '+' : '';
      const cls   = p.Status === 'Riser' ? 'cc-riser' : 'cc-faller';
      const arrow = p.Status === 'Riser' ? '▲' : '▼';
      el.innerHTML += `
        <div class="change-card">
          <div class="d-flex justify-content-between align-items-center">
            <span class="cc-name">${p.Player}</span>
            <span class="${cls}">${arrow} ${sign}${p.Change_Event.toFixed(1)}m</span>
          </div>
          <div class="cc-sub">${p.Team} · ${p.Position} · £${p.Price}m</div>
        </div>`;
    });
  } catch {
    loadPriceChangesFallback(el);
  }
}

async function loadPriceChangesFallback(el) {
  try {
    const res  = await fetch('/api/pricechanges?days=7');
    const data = await res.json();
    if (!Array.isArray(data) || !data.length) { el.innerHTML = '<p class="text-muted small">No data.</p>'; return; }
    el.innerHTML = '<p class="pos-section-hdr">Recent Price Updates</p>';
    data.forEach(item => {
      const when = isNaN(new Date(item.created_at)) ? '' : new Date(item.created_at).toLocaleDateString();
      el.innerHTML += `
        <div class="change-card">
          <div class="cc-sub">${when}</div>
          <div>${linkify(item.text || '')}</div>
          ${item.url ? `<a href="${item.url}" target="_blank" rel="noopener" class="small">View on X →</a>` : ''}
        </div>`;
    });
  } catch {
    el.innerHTML = '<p class="text-danger small">Failed to load.</p>';
  }
}

// ── SMART PICKS ────────────────────────────────────────────
async function loadSmartPicks() {
  const el = document.getElementById('smart-picks-list');
  try {
    const res   = await fetch('/api/suggestions');
    const picks = await res.json();
    if (!Array.isArray(picks) || !picks.length) throw new Error('empty');
    el.innerHTML = '';
    ['GK','DEF','MID','FWD'].forEach(pos => {
      const group = picks.filter(p => p.position === pos);
      if (!group.length) return;
      el.innerHTML += `<p class="pos-section-hdr">${pos}</p>`;
      group.forEach(p => {
        const fdrColor = p.fdr_next3 <= 2 ? 'var(--success)' : p.fdr_next3 >= 4 ? 'var(--danger)' : 'var(--warning)';
        el.innerHTML += `
          <div class="pick-card">
            <div class="pk-name">${p.name} <span class="text-muted fw-normal small">${p.team}</span></div>
            <div class="pk-sub">
              £${p.price}m · Form ${p.form} · PPG ${p.ppg}
            </div>
            <div class="pk-sub">
              FDR: <b style="color:${fdrColor}">${p.fdr_next3}</b>
              &nbsp;·&nbsp; <b style="color:var(--primary)">⚡ ${p.predicted_score}</b>
            </div>
          </div>`;
      });
    });
  } catch {
    el.innerHTML = '<p class="text-danger small">Failed to load.</p>';
  }
}

// ── POLYGON CHECKBOXES ─────────────────────────────────────
function buildPolygonCheckboxes(sample) {
  const NUMERIC = ['Total Points','Median','Avg','xG Points','Appearances',
    'Goals','Assists','Goals per App','Assists per App','Discip Index',
    'Price (GBP m)','FDR Next 3'];
  const el = document.getElementById('metricOptions');
  el.innerHTML = '';
  NUMERIC.forEach(col => {
    if (!(col in sample)) return;
    const label = document.createElement('label');
    label.className = 'metric-checkbox';
    label.innerHTML = `<input type="checkbox" value="${col}"> ${col}`;
    el.appendChild(label);
  });
}
